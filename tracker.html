<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回収率トラッカー v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #e8b84b;
    --red: #e85555;
    --green: #4bc98a;
    --text: #e8e8f0;
    --text2: #9090a8;
    --blue: #5588ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; padding: 0 0 60px; }

  .header { background: linear-gradient(135deg, #0a0a0f 0%, #1a1428 100%); border-bottom: 2px solid var(--accent); padding: 20px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-family: 'Oswald', sans-serif; font-size: 22px; color: var(--accent); letter-spacing: 2px; }
  .header-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .summary-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; padding: 16px; }
  @media(min-width:600px){ .summary-grid { grid-template-columns: repeat(4,1fr); } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card.gold::before { background: var(--accent); }
  .card.green::before { background: var(--green); }
  .card.red::before { background: var(--red); }
  .card.blue::before { background: var(--blue); }
  .card-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; margin-bottom: 6px; }
  .card-value { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700; line-height: 1; }
  .card-value.positive { color: var(--green); }
  .card-value.negative { color: var(--red); }
  .card-value.neutral { color: var(--accent); }
  .card-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

  .tabs { display: flex; gap: 4px; padding: 0 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; padding: 0 16px; }
  .tab-content.active { display: block; }

  /* 貼り付けエリア */
  .paste-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .paste-title { font-family: 'Oswald', sans-serif; font-size: 15px; color: var(--accent); letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .paste-area { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; font-family: monospace; padding: 12px; resize: vertical; min-height: 120px; outline: none; line-height: 1.6; }
  .paste-area:focus { border-color: var(--accent); }
  .parse-btn { width: 100%; margin-top: 10px; padding: 12px; background: var(--accent); color: #0a0a0f; border: none; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: opacity .2s; }
  .parse-btn:hover { opacity: .85; }

  /* 読み込み結果プレビュー */
  .preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; display: none; }
  .preview-title { font-family: 'Oswald', sans-serif; font-size: 14px; color: var(--accent); letter-spacing: 1px; margin-bottom: 14px; }
  .preview-race { background: var(--surface2); border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; }
  .preview-race-name { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .preview-meta { font-size: 12px; color: var(--text2); margin-bottom: 10px; }

  /* 買い目入力行 */
  .bet-input-row { display: grid; grid-template-columns: 80px 1fr 100px 100px 80px 40px; gap: 8px; align-items: center; margin-bottom: 8px; }
  @media(max-width:600px){ .bet-input-row { grid-template-columns: 70px 1fr 90px 90px; } }
  .bet-label { font-size: 11px; color: var(--text2); padding: 2px 0; }
  .bet-input-row input, .bet-input-row select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; padding: 7px 10px; outline: none; width: 100%; }
  .bet-input-row input:focus, .bet-input-row select:focus { border-color: var(--accent); }
  .result-mini { display: flex; gap: 4px; }
  .rm-btn { flex: 1; padding: 7px 4px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 700; cursor: pointer; transition: all .2s; text-align: center; }
  .rm-btn.hit.active { background: var(--green); border-color: var(--green); color: #fff; }
  .rm-btn.miss.active { background: var(--red); border-color: var(--red); color: #fff; }
  .del-row-btn { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 5px; padding: 5px 8px; font-size: 13px; cursor: pointer; }
  .del-row-btn:hover { border-color: var(--red); color: var(--red); }
  .add-bet-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 12px; cursor: pointer; margin-top: 4px; }
  .add-bet-btn:hover { border-color: var(--accent); color: var(--accent); }
  .save-btn { width: 100%; margin-top: 14px; padding: 12px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
  .save-btn:hover { opacity: .85; }

  /* 手動入力フォーム */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .form-title { font-family: 'Oswald', sans-serif; font-size: 15px; color: var(--accent); letter-spacing: 1px; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(min-width:600px){ .form-grid { grid-template-columns: repeat(3,1fr); } }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; color: var(--text2); }
  .form-group input, .form-group select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; padding: 9px 12px; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .result-btns { display: flex; gap: 8px; }
  .result-btn { flex: 1; padding: 9px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; }
  .result-btn.hit.active { background: var(--green); border-color: var(--green); color: #fff; }
  .result-btn.miss.active { background: var(--red); border-color: var(--red); color: #fff; }
  .add-btn { width: 100%; margin-top: 14px; padding: 12px; background: var(--accent); color: #0a0a0f; border: none; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }

  /* 一覧 */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--surface2); }
  thead th { padding: 10px 12px; text-align: left; font-size: 11px; color: var(--text2); letter-spacing: 1px; white-space: nowrap; font-weight: 500; }
  tbody tr { border-top: 1px solid var(--border); }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 12px; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .badge.hit { background: rgba(75,201,138,.15); color: var(--green); border: 1px solid rgba(75,201,138,.3); }
  .badge.miss { background: rgba(232,85,85,.15); color: var(--red); border: 1px solid rgba(232,85,85,.3); }
  .del-btn { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer; }
  .del-btn:hover { border-color: var(--red); color: var(--red); }
  .profit.pos { color: var(--green); }
  .profit.neg { color: var(--red); }
  .empty { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }

  /* 集計 */
  .stats-section { margin-bottom: 20px; }
  .stats-title { font-family: 'Oswald', sans-serif; font-size: 14px; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
  @media(min-width:600px){ .stats-grid { grid-template-columns: repeat(3,1fr); } }
  .stats-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .stats-row-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .stats-row-vals { display: flex; gap: 10px; align-items: baseline; }
  .stats-row-main { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600; }
  .stats-row-sub { font-size: 11px; color: var(--text2); }

  .csv-btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; margin-bottom: 14px; }
  .csv-btn:hover { border-color: var(--accent); color: var(--accent); }
  .clear-btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 13px; cursor: pointer; margin-bottom: 14px; margin-left: 8px; }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  .col-header { display: grid; grid-template-columns: 80px 1fr 100px 100px 80px; gap: 8px; margin-bottom: 4px; padding: 0 2px; }
  .col-header span { font-size: 10px; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <div style="font-size:28px">🏇</div>
  <div>
    <h1>回収率トラッカー v2</h1>
    <div class="header-sub">予想ツール出力テキスト対応</div>
  </div>
</div>

<div class="summary-grid">
  <div class="card gold"><div class="card-label">回収率</div><div class="card-value neutral" id="s-rate">－%</div><div class="card-sub" id="s-rate-sub">全期間</div></div>
  <div class="card green"><div class="card-label">収支合計</div><div class="card-value" id="s-profit">±0円</div><div class="card-sub" id="s-profit-sub">投資 / 払戻</div></div>
  <div class="card blue"><div class="card-label">的中率</div><div class="card-value neutral" id="s-hit">－%</div><div class="card-sub" id="s-hit-sub">0勝0敗</div></div>
  <div class="card red"><div class="card-label">記録数</div><div class="card-value neutral" id="s-count">0</div><div class="card-sub">買い目数</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('input')">📝 入力</button>
  <button class="tab" onclick="switchTab('list')">📋 一覧</button>
  <button class="tab" onclick="switchTab('stats')">📊 集計</button>
</div>

<!-- 入力タブ -->
<div id="tab-input" class="tab-content active">

  <!-- テキスト貼り付け -->
  <div class="paste-card">
    <div class="paste-title">📄 予想ツールの出力テキストを貼り付け</div>
    <textarea class="paste-area" id="paste-area" placeholder="予想ツールで「📄 分析結果を出力」したテキストをここに貼り付けてください...&#10;&#10;━━━━━━━━━━━&#10;🐎 阪神11R 阪神大賞G2　2026/3/23&#10;..."></textarea>
    <button class="parse-btn" onclick="parseText()">🔍 読み込む</button>
  </div>

  <!-- 読み込み結果プレビュー -->
  <div class="preview-card" id="preview-card">
    <div class="preview-title">✅ 読み込み完了 — 投資金額・結果を入力してください</div>
    <div id="preview-races"></div>
    <button class="save-btn" onclick="saveAll()">💾 全て記録に追加</button>
  </div>

  <!-- 手動入力 -->
  <div class="form-card">
    <div class="form-title">✏️ 手動で1件追加</div>
    <div class="form-grid">
      <div class="form-group"><label>日付</label><input type="date" id="f-date"></div>
      <div class="form-group"><label>競馬場</label>
        <select id="f-venue"><option value="">選択</option><option>東京</option><option>中山</option><option>阪神</option><option>京都</option><option>中京</option><option>小倉</option><option>福島</option><option>新潟</option><option>函館</option><option>札幌</option></select>
      </div>
      <div class="form-group"><label>レース番号</label>
        <select id="f-race-no"><option value="">－</option><option>1R</option><option>2R</option><option>3R</option><option>4R</option><option>5R</option><option>6R</option><option>7R</option><option>8R</option><option>9R</option><option>10R</option><option>11R</option><option>12R</option></select>
      </div>
      <div class="form-group full"><label>レース名</label><input type="text" id="f-name" placeholder="例：日本ダービー"></div>
      <div class="form-group"><label>馬券種別</label>
        <select id="f-type"><option value="">選択</option><option>単勝</option><option>複勝</option><option>枠連</option><option>馬連</option><option>馬単</option><option>ワイド</option><option>3連複</option><option>3連単</option></select>
      </div>
      <div class="form-group"><label>買い目</label><input type="text" id="f-buy" placeholder="例：1-3"></div>
      <div class="form-group"><label>投資金額（円）</label><input type="number" id="f-cost" placeholder="1000" min="0"></div>
      <div class="form-group"><label>払戻金額（円）</label><input type="number" id="f-return" placeholder="0" min="0"></div>
      <div class="form-group"><label>結果</label>
        <div class="result-btns">
          <button class="result-btn hit" id="btn-hit" onclick="setResult('hit')">✅ 的中</button>
          <button class="result-btn miss" id="btn-miss" onclick="setResult('miss')">❌ 外れ</button>
        </div>
      </div>
    </div>
    <button class="add-btn" onclick="addRecord()">＋ 記録を追加</button>
  </div>
</div>

<!-- 一覧タブ -->
<div id="tab-list" class="tab-content">
  <button class="csv-btn" onclick="exportCSV()">📥 CSVエクスポート</button>
  <button class="clear-btn" onclick="clearAll()">🗑 全削除</button>
  <div class="table-wrap">
    <table>
      <thead><tr><th>日付</th><th>競馬場</th><th>R</th><th>レース名</th><th>馬券種</th><th>買い目</th><th>投資</th><th>払戻</th><th>収支</th><th>結果</th><th></th></tr></thead>
      <tbody id="records-body"><tr><td colspan="11" class="empty">まだ記録がありません</td></tr></tbody>
    </table>
  </div>
</div>

<!-- 集計タブ -->
<div id="tab-stats" class="tab-content">
  <div class="stats-section">
    <div class="stats-title">馬券種別ごとの成績</div>
    <div class="stats-grid" id="type-stats"></div>
  </div>
  <div class="stats-section">
    <div class="stats-title">月別集計</div>
    <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)">
      <table>
        <thead><tr><th>月</th><th>点数</th><th>的中</th><th>的中率</th><th>投資</th><th>払戻</th><th>収支</th><th>回収率</th></tr></thead>
        <tbody id="month-body"><tr><td colspan="8" class="empty">データなし</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem('keiba_tracker_v2') || '[]');
let selectedResult = '';
let parsedRaces = []; // 貼り付け解析結果

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

// ===== タブ切替 =====
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'stats') renderStats();
  if (name === 'list') renderTable();
}

// ===== テキスト解析 =====
function parseText() {
  const text = document.getElementById('paste-area').value.trim();
  if (!text) { alert('テキストを貼り付けてください'); return; }

  parsedRaces = [];
  // 複数レースに対応：━━で区切る
  const blocks = text.split(/━+/).filter(b => b.trim());

  for (const block of blocks) {
    const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 3) continue;

    // レース名・日付・競馬場・レース番号の抽出
    // 🐎 阪神11R 阪神大賞G2　2026/3/23
    let raceLine = lines.find(l => l.includes('R ') || l.startsWith('🐎'));
    if (!raceLine) continue;
    raceLine = raceLine.replace('🐎', '').trim();

    // 日付
    const dateM = raceLine.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
    const date = dateM ? `${dateM[1]}-${String(dateM[2]).padStart(2,'0')}-${String(dateM[3]).padStart(2,'0')}` : new Date().toISOString().split('T')[0];

    // 競馬場・レース番号・レース名
    // 例: 阪神11R 阪神大賞G2
    const venueMatch = raceLine.match(/^(東京|中山|阪神|京都|中京|小倉|福島|新潟|函館|札幌)/);
    const venue = venueMatch ? venueMatch[1] : '';
    const raceNoMatch = raceLine.match(/(\d{1,2})R/);
    const raceNo = raceNoMatch ? raceNoMatch[1] + 'R' : '';
    // レース名（日付・競馬場・R番号を除いた部分）
    let raceName = raceLine.replace(/\d{4}\/\d{1,2}\/\d{1,2}/, '').replace(/^(東京|中山|阪神|京都|中京|小倉|福島|新潟|函館|札幌)/, '').replace(/\d{1,2}R/, '').replace('🐎','').trim();

    // 自信度
    const confM = block.match(/【自信度】([SABC])/);
    const conf = confM ? confM[1] : '－';

    // 買い目の抽出
    const bets = [];
    const betSection = block.match(/【買い目】([\s\S]*?)(?:━|$)/);
    if (betSection) {
      const betLines = betSection[1].split('\n').map(l => l.trim()).filter(Boolean);
      for (const bl of betLines) {
        if (bl === '見送り') continue;
        // 例: 単勝　6 / 馬連　5-6 / 3連単　6→5→4（全角・半角スペース両対応）
        const bm = bl.match(/^(単勝|複勝|枠連|馬連|馬単|ワイド|3連複|3連単)[\s　]+(.+)/);
        if (bm) {
          // スラッシュで複数買い目に分割
          const nums = bm[2].split('/').map(n => n.trim()).filter(Boolean);
          for (const num of nums) {
            bets.push({ type: bm[1], buy: num, cost: '', ret: 0, result: '' });
          }
        }
      }
    }

    if (bets.length === 0 && conf !== 'C') {
      // 買い目が見つからない場合でも枠を作る
      bets.push({ type: '', buy: '', cost: '', ret: 0, result: '' });
    }

    if (conf === 'C' && bets.length === 0) continue; // 見送りはスキップ

    parsedRaces.push({ date, venue, raceNo, raceName, conf, bets });
  }

  if (parsedRaces.length === 0) {
    alert('レース情報を読み込めませんでした。\n予想ツールの「📄 分析結果を出力」で生成したテキストを貼り付けてください。');
    return;
  }

  renderPreview();
}

function renderPreview() {
  const container = document.getElementById('preview-races');
  container.innerHTML = '';

  parsedRaces.forEach((race, ri) => {
    const div = document.createElement('div');
    div.className = 'preview-race';
    div.innerHTML = `
      <div class="preview-race-name">🐎 ${race.venue}${race.raceNo} ${race.raceName}</div>
      <div class="preview-meta">${race.date}　自信度：${race.conf}</div>
      <div class="col-header">
        <span>馬券種</span><span>買い目</span><span>投資金額</span><span>払戻金額</span><span>結果</span>
      </div>
      <div id="bet-rows-${ri}"></div>
      <button class="add-bet-btn" onclick="addBetRow(${ri})">＋ 買い目を追加</button>
    `;
    container.appendChild(div);
    renderBetRows(ri);
  });

  document.getElementById('preview-card').style.display = 'block';
  document.getElementById('preview-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderBetRows(ri) {
  const container = document.getElementById('bet-rows-' + ri);
  if (!container) return;
  const race = parsedRaces[ri];
  container.innerHTML = race.bets.map((bet, bi) => `
    <div class="bet-input-row" id="bet-${ri}-${bi}">
      <select onchange="parsedRaces[${ri}].bets[${bi}].type=this.value" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px 8px;outline:none;width:100%">
        <option value="">種別</option>
        ${['単勝','複勝','枠連','馬連','馬単','ワイド','3連複','3連単'].map(t=>`<option value="${t}" ${bet.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <input type="text" value="${bet.buy}" placeholder="例:5-6" onchange="parsedRaces[${ri}].bets[${bi}].buy=this.value"
        style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;width:100%">
      <input type="number" value="${bet.cost}" placeholder="金額" onchange="parsedRaces[${ri}].bets[${bi}].cost=parseInt(this.value)||0"
        style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;width:100%">
      <input type="number" value="${bet.ret||''}" placeholder="払戻" onchange="parsedRaces[${ri}].bets[${bi}].ret=parseInt(this.value)||0"
        style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;width:100%">
      <div class="result-mini">
        <button class="rm-btn hit ${bet.result==='hit'?'active':''}" onclick="setBetResult(${ri},${bi},'hit')">的中</button>
        <button class="rm-btn miss ${bet.result==='miss'?'active':''}" onclick="setBetResult(${ri},${bi},'miss')">外れ</button>
      </div>
      <button class="del-row-btn" onclick="delBetRow(${ri},${bi})">×</button>
    </div>
  `).join('');
}

function setBetResult(ri, bi, result) {
  parsedRaces[ri].bets[bi].result = result;
  if (result === 'miss') parsedRaces[ri].bets[bi].ret = 0;
  renderBetRows(ri);
}

function addBetRow(ri) {
  parsedRaces[ri].bets.push({ type: '', buy: '', cost: '', ret: 0, result: '' });
  renderBetRows(ri);
}

function delBetRow(ri, bi) {
  parsedRaces[ri].bets.splice(bi, 1);
  renderBetRows(ri);
}

function saveAll() {
  let count = 0;
  for (const race of parsedRaces) {
    for (const bet of race.bets) {
      if (!bet.type || !bet.cost) continue;
      records.push({
        id: Date.now() + Math.random(),
        date: race.date, venue: race.venue, raceNo: race.raceNo,
        name: race.raceName, type: bet.type, buy: bet.buy,
        cost: parseInt(bet.cost) || 0, ret: parseInt(bet.ret) || 0,
        result: bet.result
      });
      count++;
    }
  }
  if (count === 0) { alert('投資金額・馬券種別が入力されていません'); return; }
  save();
  renderSummary();
  renderTable();
  document.getElementById('preview-card').style.display = 'none';
  document.getElementById('paste-area').value = '';
  parsedRaces = [];
  alert(`✅ ${count}件を記録しました！`);
}

// ===== 手動入力 =====
function setResult(r) {
  selectedResult = r;
  document.getElementById('btn-hit').classList.toggle('active', r === 'hit');
  document.getElementById('btn-miss').classList.toggle('active', r === 'miss');
  if (r === 'miss') document.getElementById('f-return').value = 0;
}

function addRecord() {
  const date = document.getElementById('f-date').value;
  const type = document.getElementById('f-type').value;
  const cost = parseInt(document.getElementById('f-cost').value) || 0;
  if (!date || !type || !cost) { alert('日付・馬券種別・投資金額は必須です'); return; }
  records.push({
    id: Date.now(),
    date, venue: document.getElementById('f-venue').value,
    raceNo: document.getElementById('f-race-no').value,
    name: document.getElementById('f-name').value.trim(),
    type, buy: document.getElementById('f-buy').value.trim(),
    cost, ret: parseInt(document.getElementById('f-return').value) || 0,
    result: selectedResult
  });
  save(); renderSummary(); renderTable();
  document.getElementById('f-venue').value = '';
  document.getElementById('f-race-no').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-type').value = '';
  document.getElementById('f-buy').value = '';
  document.getElementById('f-cost').value = '';
  document.getElementById('f-return').value = '';
  selectedResult = '';
  document.getElementById('btn-hit').classList.remove('active');
  document.getElementById('btn-miss').classList.remove('active');
}

// ===== 共通 =====
function save() { localStorage.setItem('keiba_tracker_v2', JSON.stringify(records)); }
function fmt(n) { return n.toLocaleString() + '円'; }
function fmtProfit(n) { return (n >= 0 ? '+' : '') + n.toLocaleString() + '円'; }

function renderSummary() {
  const total = records.length;
  const totalCost = records.reduce((a, r) => a + r.cost, 0);
  const totalRet = records.reduce((a, r) => a + r.ret, 0);
  const profit = totalRet - totalCost;
  const rate = totalCost > 0 ? Math.round(totalRet / totalCost * 100) : 0;
  const hits = records.filter(r => r.result === 'hit').length;
  const hitRate = total > 0 ? Math.round(hits / total * 100) : 0;

  const rateEl = document.getElementById('s-rate');
  rateEl.textContent = total > 0 ? rate + '%' : '－%';
  rateEl.className = 'card-value ' + (rate >= 100 ? 'positive' : rate > 0 ? 'negative' : 'neutral');

  const profitEl = document.getElementById('s-profit');
  profitEl.textContent = fmtProfit(profit);
  profitEl.className = 'card-value ' + (profit > 0 ? 'positive' : profit < 0 ? 'negative' : 'neutral');
  document.getElementById('s-profit-sub').textContent = fmt(totalCost) + ' / ' + fmt(totalRet);

  document.getElementById('s-hit').textContent = total > 0 ? hitRate + '%' : '－%';
  document.getElementById('s-hit-sub').textContent = hits + '勝' + (total - hits) + '敗';
  document.getElementById('s-count').textContent = total;
}

function renderTable() {
  const tbody = document.getElementById('records-body');
  if (records.length === 0) { tbody.innerHTML = '<tr><td colspan="11" class="empty">まだ記録がありません</td></tr>'; return; }
  const sorted = [...records].sort((a, b) => b.date.localeCompare(a.date));
  tbody.innerHTML = sorted.map(r => {
    const profit = r.ret - r.cost;
    const pClass = profit > 0 ? 'pos' : profit < 0 ? 'neg' : '';
    const badge = r.result === 'hit' ? '<span class="badge hit">的中</span>' : r.result === 'miss' ? '<span class="badge miss">外れ</span>' : '－';
    return `<tr>
      <td>${r.date}</td><td>${r.venue||'－'}</td><td>${r.raceNo||'－'}</td><td>${r.name||'－'}</td>
      <td>${r.type}</td><td>${r.buy||'－'}</td><td>${r.cost.toLocaleString()}</td><td>${r.ret.toLocaleString()}</td>
      <td class="profit ${pClass}">${fmtProfit(profit)}</td><td>${badge}</td>
      <td><button class="del-btn" onclick="deleteRecord(${r.id})">削除</button></td>
    </tr>`;
  }).join('');
}

function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  save(); renderSummary(); renderTable();
}

function renderStats() {
  const types = ['単勝','複勝','枠連','馬連','馬単','ワイド','3連複','3連単'];
  const typeEl = document.getElementById('type-stats');
  const rows = types.map(t => {
    const recs = records.filter(r => r.type === t);
    if (!recs.length) return null;
    const cost = recs.reduce((a, r) => a + r.cost, 0);
    const ret = recs.reduce((a, r) => a + r.ret, 0);
    const hits = recs.filter(r => r.result === 'hit').length;
    const rate = cost > 0 ? Math.round(ret / cost * 100) : 0;
    const profit = ret - cost;
    const pClass = profit > 0 ? 'positive' : profit < 0 ? 'negative' : 'neutral';
    return `<div class="stats-row">
      <div class="stats-row-label">${t}（${recs.length}点 / ${hits}的中）</div>
      <div class="stats-row-vals"><span class="stats-row-main ${pClass}">${rate}%</span><span class="stats-row-sub">${fmtProfit(profit)}</span></div>
    </div>`;
  }).filter(Boolean);
  typeEl.innerHTML = rows.length ? rows.join('') : '<div style="color:var(--text2);font-size:13px;padding:10px;">データなし</div>';

  const monthMap = {};
  records.forEach(r => { const m = r.date.slice(0,7); if(!monthMap[m]) monthMap[m]=[]; monthMap[m].push(r); });
  const months = Object.keys(monthMap).sort().reverse();
  const mbody = document.getElementById('month-body');
  if (!months.length) { mbody.innerHTML = '<tr><td colspan="8" class="empty">データなし</td></tr>'; return; }
  mbody.innerHTML = months.map(m => {
    const recs = monthMap[m];
    const cost = recs.reduce((a,r)=>a+r.cost,0);
    const ret = recs.reduce((a,r)=>a+r.ret,0);
    const hits = recs.filter(r=>r.result==='hit').length;
    const rate = cost > 0 ? Math.round(ret/cost*100) : 0;
    const profit = ret - cost;
    const hitRate = Math.round(hits/recs.length*100);
    const pClass = profit > 0 ? 'positive' : profit < 0 ? 'negative' : '';
    return `<tr><td>${m}</td><td>${recs.length}</td><td>${hits}</td><td>${hitRate}%</td>
      <td>${cost.toLocaleString()}</td><td>${ret.toLocaleString()}</td>
      <td class="${pClass}">${fmtProfit(profit)}</td><td class="${pClass}">${rate}%</td></tr>`;
  }).join('');
}

function exportCSV() {
  if (!records.length) { alert('データがありません'); return; }
  const header = ['日付','競馬場','レース番号','レース名','馬券種別','買い目','投資金額','払戻金額','収支','結果'];
  const rows = records.map(r => [r.date,r.venue,r.raceNo,r.name,r.type,r.buy,r.cost,r.ret,r.ret-r.cost,r.result==='hit'?'的中':r.result==='miss'?'外れ':'']);
  const csv = [header,...rows].map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '回収率トラッカー_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function clearAll() {
  if (!confirm('全データを削除しますか？')) return;
  records = []; save(); renderSummary(); renderTable();
}

renderSummary(); renderTable();
</script>
</body>
</html>
