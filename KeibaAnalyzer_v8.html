function getDayCat(d) {
  const n=Number(d);
  return n<=2?"early":n<=4?"mid":n<=6?"late":"final";
}
function getAutoBias(course,type,day) {
  const db=COURSE_BIAS_DB[course];
  if(!db) return {bias:"フラット",note:"データなし"};
  return {bias:(type==="ダ"?db.ダ:db.芝)[getDayCat(day)], note:db.note};
}

const JOCKEY_S_FOREIGN=["モレイラ","ムーア","デットーリ","レーン","ボウマン","マクドナルド","スミヨン","ビュイック","ドイル","デムーロ"];
function isForeign(name){ return /^[ァ-ヶー・]+$/.test((name||"").trim()) && (name||"").trim().length>=3; }
const JOCKEY_DB={
  "ルメール":100,"川田将雅":97,"モレイラ":100,"ムーア":100,"デットーリ":100,
  "レーン":98,"ボウマン":97,"マクドナルド":96,"スミヨン":96,"デムーロ":94,
  "戸崎圭太":88,"岩田康誠":84,"横山典弘":84,"池添謙一":83,"岩田望来":83,
  "松山弘平":82,"坂井瑠星":82,"鮫島克駿":82,
  "浜中俊":80,"武豊":80,"北村友一":79,"三浦皇成":79,"団野大成":78,
  "吉田隼人":76,"丸山元気":75,"田辺裕信":75,"西村淳也":74,"藤岡佑介":74,
  "和田竜二":73,"横山和生":73,"幸英明":72,
  "酒井学":71,"菱田裕二":69,"富田暁":69,"佐々木大":69,
  "高杉吏麒":66,"太宰啓介":66,"丸田恭介":63,
};
function getJockeyScore(name){
  if(!name||!name.replace(/-/g,"").trim()) return 55;
  for(const [k,v] of Object.entries(JOCKEY_DB)){
    if(name.includes(k)||k.includes(name)) return v;
  }
  if(isForeign(name)){
    if(JOCKEY_S_FOREIGN.some(s=>name.includes(s)||s.includes(name))) return 97;
    return 85;
  }
  return 63;
}

const COND_SCORE={"良":100,"稍重":78,"重":55,"不良":30};

function riderChangeLabel(prev,curr){
  if(!prev||!curr||prev===curr) return "変化なし";
  if(!prev.replace(/-/g,"").trim()) return "変化なし";
  const d=getJockeyScore(curr)-getJockeyScore(prev);
  if(d>=15) return "大幅強化";
  if(d>=5)  return "強化";
  if(d<=-15) return "大幅弱体";
  if(d<=-5)  return "弱体";
  return "横乗り";
}
const RIDER_SCORE={"大幅強化":100,"強化":82,"横乗り":55,"変化なし":50,"弱体":25,"大幅弱体":5};

// 枠番×バイアス（新5種類体系）
function wakuBiasScore(waku,bias){
  const w=Number(waku)||0;
  if(!w) return 55;
  if(bias==="内・逃げ先行有利"||bias==="内・差し有利")
    return w<=2?95:w<=4?80:w<=6?58:w<=7?40:25;
  if(bias==="外・差し有利"||bias==="外・先行有利")
    return w<=2?25:w<=4?42:w<=6?65:w<=7?82:95;
  return 58;
}
function wakuPenalty(waku,bias){
  const w=Number(waku)||0;
  if(!w||bias==="フラット") return 1.0;
  if(bias==="内・逃げ先行有利"||bias==="内・差し有利")
    return w<=2?1.00:w<=4?0.96:w<=6?0.90:w<=7?0.83:0.75;
  if(bias==="外・差し有利"||bias==="外・先行有利")
    return w<=2?0.75:w<=4?0.83:w<=6?0.90:w<=7?0.96:1.00;
  return 1.0;
}

function parseTime(t){
  if(!t||!t.trim()) return null;
  const p=t.trim().split(".");
  try{
    if(p.length===3) return parseInt(p[0])*60+parseInt(p[1])+parseInt(p[2])/10;
    if(p.length===2) return parseInt(p[0])+parseInt(p[1])/10;
  }catch{}
  return null;
}
const OVERSEAS_KW=["海外","豪州","香港","ＵＡＥ","ｻｳｼﾞ","仏国","英国","米国","愛国","南ア","ｱﾗ首"];
const isDom=b=>!OVERSEAS_KW.some(o=>b.includes(o));

// クラス名からグレードボーナス（全角半角両対応）
function gradeFromClass(cls){
  if(!cls) return 0;
  const c=cls.replace(/[Ａ-Ｚａ-ｚ０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0));
  if(/G1|GI/i.test(c)) return 100;
  if(/G2|GII/i.test(c)) return 75;
  if(/G3|GIII/i.test(c)) return 55;
  if(/OP|オープン|Listed|L$/i.test(c)) return 35;
  return 0;
}

// 全角数字を半角に変換してparseInt
function parseIntZen(s){
  if(!s) return 99;
  const h=s.trim().replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  const n=parseInt(h);
  return isNaN(n)?99:n;
}

function parseZenbaCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  const headers=lines[0].split(",");
  const n=headers.length;
  // カラムインデックス
  const IDX={nanhaemae:1,basho:6,dist:41,trackType:40,jockey:35,
    time:50,agari:65,style:62,name:139,chaku:26,className:9};

  return lines.slice(1).map(rowStr=>{
    const row=rowStr.split(",");
    const nRuns=Math.floor(row.length/n);
    const name=(row[IDX.name]||"").trim();
    let times=[],agariList=[],styleList=[];
    let prevJockey="",prevFound=false,firstRunOverseas=false;
    const courseStats={};
    // G1/G2/G3好走スコア（近5走以内の最高グレード×着順）
    let gradeBonusScore=0;

    for(let i=0;i<nRuns;i++){
      const b=row.slice(i*n,(i+1)*n);
      const basho=(b[IDX.basho]||"").trim();
      const dist=(b[IDX.dist]||"").trim();
      const agari=(b[IDX.agari]||"").trim();
      const timeRaw=(b[IDX.time]||"").trim();
      const style=(b[IDX.style]||"").trim();
      const jk=(b[IDX.jockey]||"").trim();
      const nm=parseInt(b[IDX.nanhaemae]||"99")||99;
      const chaku=parseIntZen(b[IDX.chaku]);
      const cls=(b[IDX.className]||"").trim();
      const dom=isDom(basho);

      // 前走騎手取得（海外はスキップして直近国内を採用）
      if(!prevFound && jk && jk.replace(/-/g,"").trim()){
        if(i===0){ firstRunOverseas=!dom; if(dom){prevJockey=jk;prevFound=true;} }
        else if(dom){prevJockey=jk;prevFound=true;}
      }

      // タイム・上り・脚質（全走収集）
      const t=parseTime(timeRaw);
      if(t&&dist) times.push({dist,t,isOverseas:!dom,nm,chaku});
      if(agari&&agari!=="不明"){const a=parseFloat(agari);if(!isNaN(a)) agariList.push({val:a,nm});}
      if(style&&style!=="不明") styleList.push(style);

      // コース適性（国内のみ）
      if(dom){
        const key=`${basho}_${b[IDX.trackType]||""}_${dist}`;
        if(!courseStats[key]) courseStats[key]={wins:0,places:0,runs:0};
        courseStats[key].runs++;
        if(chaku===1) courseStats[key].wins++;
        if(chaku<=3) courseStats[key].places++;
      }

      // 重賞実績ボーナス（近5走以内・国内・3着以内）
      if(i<5 && dom && chaku<=3){
        const g=gradeFromClass(cls);
        if(g>0){
          // 着順係数：1着=100%、2着=70%、3着=45%
          const placeCoef=chaku===1?1.0:chaku===2?0.7:0.45;
          gradeBonusScore=Math.max(gradeBonusScore, Math.round(g*placeCoef));
        }
      }
    }
    return {name,prevJockey,firstRunOverseas,times,agariList,styleList,courseStats,gradeBonusScore};
  }).filter(h=>h.name);
}

function parseShutsubaCSV(text){
  const entries={};
  for(const line of text.split(/\r?\n/)){
    if(!line.trim()) continue;
    const cols=line.split(",");
    if(cols.length<23) continue;
    const bango=cols[3].trim(),name=cols[7].trim(),jockey=cols[10].trim();
    // 列22が正しい枠番（1〜8）、列19は別データ
    const waku=cols[22].trim();
    if(name) entries[name]={bango,jockey,waku};
  }
  return entries;
}

// コース適性スコア
function calcCourseApt(courseStats,course,type,dist){
  const exact=courseStats[`${course}_${type}_${dist}`];
  if(exact&&exact.runs>=2){
    return {score:Math.min(100,Math.round(20+exact.places/exact.runs*65+exact.wins/exact.runs*15)),label:`${exact.runs}走`,basis:"同コース同距離"};
  }
  const near=Object.keys(courseStats).filter(k=>{const[b,t,d]=k.split("_");return b===course&&t===type&&Math.abs(Number(d)-Number(dist))<=200;});
  if(near.length){
    const c=near.reduce((a,k)=>({wins:a.wins+courseStats[k].wins,places:a.places+courseStats[k].places,runs:a.runs+courseStats[k].runs}),{wins:0,places:0,runs:0});
    if(c.runs>=2) return {score:Math.min(95,Math.round(18+c.places/c.runs*60+c.wins/c.runs*12)),label:`${c.runs}走`,basis:"同コース近距離"};
  }
  const same=Object.keys(courseStats).filter(k=>k.split("_")[1]===type);
  if(same.length){
    const c=same.reduce((a,k)=>({wins:a.wins+courseStats[k].wins,places:a.places+courseStats[k].places,runs:a.runs+courseStats[k].runs}),{wins:0,places:0,runs:0});
    if(c.runs>=2) return {score:Math.min(85,Math.round(25+c.places/c.runs*45)),label:`${c.runs}走`,basis:"同芝ダート"};
  }
  return {score:50,label:"データ少",basis:"参考なし"};
}

// 正規化
function normalizeScores(arr,isLower=false){
  const valid=arr.filter(v=>v!==null);
  if(valid.length<2) return arr.map(()=>60);
  const best=isLower?Math.min(...valid):Math.max(...valid);
  const worst=isLower?Math.max(...valid):Math.min(...valid);
  const range=Math.abs(best-worst);
  if(range===0) return arr.map(v=>v!==null?75:55);
  return arr.map(v=>v===null?null:Math.round(100-Math.abs(v-best)/range*72));
}

// 総合スコア計算
function calcTotal(horse,W,cat){
  const scores={
    bestTime:  horse.bestTimeScore??55,
    agari3f:   horse.agariScore??55,
    style:     horse.styleScore??55,
    courseApt: horse.courseAptScore??50,
    jockey:    horse.jockeyScore??55,
    riderChange:horse.riderScore??50,
    trackBias: horse.wakuBiasScore??55,
    trackCond: horse.condScore??100,
    gradeBonus:horse.gradeBonusScore??0,
  };
  const base=Object.entries(scores).reduce((s,[k,v])=>s+v*(W[k]||0),0)/100;
  const pen=horse.wakuPenalty??1.0;
  const stylePen=(cat==="sprint"&&horse.style==="逃げ")?0.93:1.0;
  // 上り3Fが全馬トップクラス（90点以上）の末脚型はフォームペナルティを緩和
  // 差し・追い込み馬は着順が安定しにくいが末脚は本物という競馬の実態を反映
  const agariS=horse.agariScore??55;
  const rawForm=horse.formPenalty??1.0;
  const formPen=agariS>=90 ? Math.min(1.0, rawForm+(1.0-rawForm)*0.7)  // 90点以上：ペナルティを70%緩和
              : agariS>=80 ? Math.min(1.0, rawForm+(1.0-rawForm)*0.4)  // 80点以上：ペナルティを40%緩和
              : rawForm;
  return {total:Math.round(base*pen*stylePen*formPen*10)/10,scores};
}

// 印（順位ベース）
function getRankByPos(pos){
  if(pos===0) return {label:"◎ 本命",short:"◎",color:"#ff4e4e",bg:"rgba(255,78,78,0.10)"};
  if(pos===1) return {label:"○ 対抗",short:"○",color:"#ff9f1c",bg:"rgba(255,159,28,0.10)"};
  if(pos===2) return {label:"▲ 単穴",short:"▲",color:"#f7ec59",bg:"rgba(247,236,89,0.10)"};
  if(pos===3) return {label:"☆ 特注",short:"☆",color:"#a78bfa",bg:"rgba(167,139,250,0.10)"};
  if(pos<=5)  return {label:"△ 連下",short:"△",color:"#4ecdc4",bg:"rgba(78,205,196,0.08)"};
  return {label:"× 消し",short:"×",color:"#555",bg:"rgba(80,80,80,0.06)"};
}

// 買い目生成
function genBets(results){
  const bets=[];
  const[r1,r2,r3]=results;
  if(r1) bets.push({type:"単勝",label:`${r1.bango||r1.name}`,desc:r1.name,conf:"高"});
  if(r1&&r2) bets.push({type:"馬連",label:`${r1.bango||r1.name} - ${r2.bango||r2.name}`,desc:`${r1.name}↔${r2.name}`,conf:"高"});
  if(r1&&r2) bets.push({type:"馬単",label:`${r1.bango||r1.name}→${r2.bango||r2.name}`,desc:`${r1.name}→${r2.name}`,conf:"中"});
  if(r1&&r2&&r3) bets.push({type:"三連複",label:`${r1.bango}-${r2.bango}-${r3.bango}`,desc:`${r1.name}/${r2.name}/${r3.name}`,conf:"中"});
  if(r1&&r2&&r3) bets.push({type:"三連単",label:`${r1.bango}→${r2.bango}→${r3.bango}`,desc:`${r1.name}→${r2.name}→${r3.name}`,conf:"低"});
  const top4=results.filter(h=>h.rank&&["◎","○","▲","☆"].includes(h.rank.short));
  for(let i=0;i<top4.length;i++) for(let j=i+1;j<top4.length;j++){
    const[ha,hb]=[top4[i],top4[j]];
    bets.push({type:"ワイド",label:`${ha.bango||ha.name} - ${hb.bango||hb.name}`,desc:`${ha.name}↔${hb.name}`,conf:i===0&&j===1?"高":i<=1?"中":"低"});
  }
  return bets;
}

  const[msg,setMsg]=React.useState("");
  const[err,setErr]=React.useState("");
  const[loading,setLoading]=React.useState(false);
  const zenbaRef=React.useRef(),shutsubaRef=React.useRef();

  // アクティブレースのデータ
  const activeRace=races.find(r=>r.id===activeRaceId)||null;
  const horses    =activeRace?.horses    ||[];
  const raceName  =activeRace?.name      ||"";
  const distance  =activeRace?.distance  ||"1200";
  const trackType =activeRace?.trackType ||"芝";
  const cond      =activeRace?.cond      ||"良";
  const course    =activeRace?.course    ||"中京";
  const kaisaiDay =activeRace?.kaisaiDay ||"1";
  const manualBias=activeRace?.manualBias||"";
  const sortKey   =activeRace?.sortKey   ||"total";

  // アクティブレースの個別フィールドを更新するヘルパー
  const updateRace=(field,value)=>{
    if(!activeRaceId) return;
    setRaces(rs=>rs.map(r=>r.id===activeRaceId?{...r,[field]:value}:r));
  };
  const setRaceName  =v=>updateRace("name",v);
  const setDistance  =v=>updateRace("distance",v);
  const setTrackType =v=>updateRace("trackType",v);
  const setCond      =v=>updateRace("cond",v);
  const setCourse    =v=>updateRace("course",v);
  const setKaisaiDay =v=>updateRace("kaisaiDay",v);
  const setManualBias=v=>updateRace("manualBias",v);
  const setSortKey   =v=>updateRace("sortKey",v);
  const setHorses    =v=>updateRace("horses",v);

  // レース削除
  const deleteRace=(id)=>{
    setRaces(rs=>{
      const next=rs.filter(r=>r.id!==id);
      if(activeRaceId===id) setActiveRaceId(next.length?next[next.length-1].id:null);
      return next;
    });
  };

  const cat=getDistCat(distance);
  const W=WEIGHTS[cat];
  const autoBiasResult=getAutoBias(course,trackType,kaisaiDay);
  const effectiveBias=manualBias||autoBiasResult.bias;

  const flash=(m,isErr=false)=>{
    if(isErr) setErr(m); else setMsg(m);
    setTimeout(()=>isErr?setErr(""):setMsg(""),3000);
  };

  // 結果計算（リアルタイム）
  // 印は常に総合スコア順で付与 → 表示順だけsortKeyで変える
  const ranked=horses.length>0
    ?horses.map(h=>{
        const wbs=wakuBiasScore(h.waku,effectiveBias);
        const pen=wakuPenalty(h.waku,effectiveBias);
        const stl=(BIAS_TABLE[effectiveBias]||BIAS_TABLE["フラット"])[h.style]||55;
        const cnd=COND_SCORE[cond]||100;
        const h2={...h,wakuBiasScore:wbs,wakuPenalty:pen,styleScore:stl,condScore:cnd};
        const{total,scores}=calcTotal(h2,W,cat);
        return{...h2,total,scores};
      })
      .sort((a,b)=>b.total-a.total)      // 印は常に総合スコア順
      .map((h,i)=>({...h,rank:getRankByPos(i)}))
    :[];

  // 表示用：sortKeyで並べ替え
  const results=[...ranked].sort((a,b)=>{
    if(sortKey==="agari3f")    return (b.agariScore??55)-(a.agariScore??55);
    if(sortKey==="bestTime")   return (b.bestTimeScore??55)-(a.bestTimeScore??55);
    if(sortKey==="gradeBonus") return (b.gradeBonusScore||0)-(a.gradeBonusScore||0);
    if(sortKey==="jockey")     return (b.jockeyScore??55)-(a.jockeyScore??55);
    if(sortKey==="riderChange")return (b.riderScore??50)-(a.riderScore??50);
    return b.total-a.total;
  });

  const topScore=ranked[0]?.total||1;
  const bets=genBets(ranked);

  // CSV読込（ファイル選択方式・Shift-JIS対応）
  const handleFiles=React.useCallback(async()=>{
    const zenbaFile=zenbaRef.current?.files[0];
    if(!zenbaFile){flash("全馬CSVを選択してください",true);return;}
    setLoading(true);
    try{
      const readSJIS=f=>new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>res(e.target.result);
        r.onerror=rej;
        r.readAsText(f,"Shift-JIS");
      });
      const zenbaText=await readSJIS(zenbaFile);
      const zenbaData=parseZenbaCSV(zenbaText);
      let entries={};
      let detDist=distance,detType=trackType,detCourse=course,detName=raceName;
      if(shutsubaRef.current?.files[0]){
        const st=await readSJIS(shutsubaRef.current.files[0]);
        entries=parseShutsubaCSV(st);
        const first=st.split(/\r?\n/).find(l=>l.trim());
        if(first){
          const cols=first.split(",");
          if(cols[4]) detName=cols[4].trim();
          if(cols[5]) detType=cols[5].trim().includes("芝")?"芝":"ダ";
          if(cols[6]) detDist=cols[6].trim();
          if(cols[1]&&COURSES.includes(cols[1].trim())) detCourse=cols[1].trim();
          setRaceName(detName);setTrackType(detType);setDistance(detDist);setCourse(detCourse);
        }
      }

      // 近5走以内の国内同距離タイム（最大3走平均）
      // データが1本以下の場合はnull（中立値55点）として扱う
      const avgTimes=zenbaData.map(h=>{
        const dom=h.times.filter(t=>t.dist===detDist&&!t.isOverseas).sort((a,b)=>a.nm-b.nm).slice(0,5);
        if(dom.length<=1) return null; // 1本以下は中立扱い（相対評価で不利にならないよう）
        const use=dom.slice(0,3).map(t=>t.t);
        return use.reduce((s,v)=>s+v,0)/use.length;
      });
      const timeScores=normalizeScores(avgTimes,true);

      // 近5走の上り3F（最大3走平均）
      const avgAgari=zenbaData.map(h=>{
        const sorted=h.agariList.sort((a,b)=>a.nm-b.nm).slice(0,5);
        if(!sorted.length) return null;
        const use=sorted.slice(0,3).map(a=>a.val);
        return use.reduce((s,v)=>s+v,0)/use.length;
      });
      const agariScores=normalizeScores(avgAgari,true);

      const processed=zenbaData.map((h,idx)=>{
        const entry=entries[h.name]||{};
        const currJockey=entry.jockey||"";
        const prevJockey=h.prevJockey||"";
        const rcLabel=riderChangeLabel(prevJockey,currJockey);
        const style=h.styleList.length>0
          ?h.styleList.sort((a,b)=>h.styleList.filter(v=>v===b).length-h.styleList.filter(v=>v===a).length)[0]
          :"不明";

        // 国内同距離タイム（持ち時計用）
        const domTimes=h.times.filter(t=>t.dist===detDist&&!t.isOverseas).sort((a,b)=>a.nm-b.nm);
        const bestTime=domTimes.length?Math.min(...domTimes.map(t=>t.t)):null;
        const bestAgari=h.agariList.length?Math.min(...h.agariList.map(a=>a.val)):null;
        const isOverseasReturn=h.firstRunOverseas||false;

        // 直近国内着順は距離問わず全国内走から取得
        const allDomRuns=h.times.filter(t=>!t.isOverseas).sort((a,b)=>a.nm-b.nm);
        const recentChaku=allDomRuns[0]?.chaku??99;
        const best5Chaku=allDomRuns.slice(0,5).reduce((b,t)=>Math.min(b,t.chaku),99);

        // フォームペナルティ（直近国内着順＋近5走ベスト組み合わせ）
        const formPenalty=
          recentChaku===1                     ?1.06:
          recentChaku<=3&&best5Chaku===1      ?1.05:
          recentChaku<=3                      ?1.03:
          recentChaku<=5&&best5Chaku<=2       ?1.02:
          recentChaku<=5                      ?1.00:
          recentChaku<=8&&best5Chaku<=3       ?0.98:
          recentChaku<=8                      ?0.96:
          best5Chaku<=3                       ?0.95:0.92;

        const courseApt=calcCourseApt(h.courseStats,detCourse,detType,detDist);

        return{
          name:h.name, bango:entry.bango||"", waku:entry.waku||"",
          jockey:currJockey, prevJockey, rcLabel, style,
          isOverseasReturn, recentChaku, best5Chaku, formPenalty,
          bestTime:bestTime?bestTime.toFixed(1):null,
          bestAgari:bestAgari?bestAgari.toFixed(1):null,
          runs1200:domTimes.length,
          bestTimeScore:timeScores[idx]??55,
          agariScore:agariScores[idx]??55,
          jockeyScore:getJockeyScore(currJockey),
          riderScore:RIDER_SCORE[rcLabel]??50,
          courseAptScore:courseApt.score,
          courseAptLabel:courseApt.label,
          courseAptBasis:courseApt.basis,
          gradeBonusScore:h.gradeBonusScore||0,
          wakuBiasScore:55, styleScore:55, condScore:100, wakuPenalty:1.0,
        };
      });

      // 新レースとして追加（最大10件）
      const newId = Date.now().toString();
      const newRace = {
        id: newId,
        name: detName||"レース",
        horses: processed,
        distance: detDist,
        trackType: detType,
        cond: "良",
        course: detCourse,
        kaisaiDay: "1",
        manualBias: "",
        sortKey: "total",
      };
      setRaces(rs=>[...rs, newRace]); // 制限なし
      setActiveRaceId(newId);
      setTab("result");
      flash(`✓ ${processed.length}頭のデータを読み込みました`);
    }catch(e){flash("読み込みエラー: "+e.message,true);}
    setLoading(false);
  },[distance,course,trackType,raceName]);

  const exportCSV=()=>{
    const hdr="順位,馬番,馬名,印,スコア,持ち時計,上り3F,重賞実績,コース適性,脚質,騎手,乗り替わり,直近着,近5best\n";
    const rows=results.map((h,i)=>`${i+1},${h.bango},${h.name},${h.rank.short},${h.total},${h.bestTime||""},${h.bestAgari||""},${h.gradeBonusScore},${h.courseAptScore}(${h.courseAptLabel}),${h.style},${h.jockey},${h.rcLabel},${h.recentChaku<=18?h.recentChaku+"着":""},${h.best5Chaku<=18?h.best5Chaku+"着":""}`).join("\n");
    const blob=new Blob(["\uFEFF"+hdr+rows],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${raceName||"分析"}_予想.csv`;a.click();
  };

  const INNER_TABS=[["result","📊 分析結果"],["bets","🎯 買い目"],["bias","🏟 バイアス"],["weights","⚖️ 重み"]];

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#050810 0%,#090f1c 55%,#050910 100%)",fontFamily:"'Georgia','Times New Roman',serif",color:"#e8dcc8",padding:"14px 8px"}}>

      {/* Header */}
      <div style={{textAlign:"center",marginBottom:18}}>
        <div style={{fontSize:9,letterSpacing:6,color:"#5a4018",marginBottom:4}}>TARGET CSV AUTO ANALYSIS v7.0</div>
        <h1 style={{fontSize:"clamp(18px,4vw,32px)",fontWeight:700,margin:0,background:"linear-gradient(90deg,#a07010,#f0d060,#a07010)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:2}}>競馬本格分析 v7.0</h1>
        <div style={{fontSize:9,color:"#3a2810",marginTop:3,letterSpacing:3}}>重賞実績自動評価 ／ 海外帰り馬対応 ／ 近走状態重視</div>
        {msg&&<div style={{marginTop:8,display:"inline-block",background:"rgba(78,205,196,0.15)",border:"1px solid #4ecdc4",borderRadius:6,padding:"5px 16px",fontSize:13,color:"#4ecdc4"}}>{msg}</div>}
        {err&&<div style={{marginTop:8,display:"inline-block",background:"rgba(255,78,78,0.12)",border:"1px solid #ff4e4e",borderRadius:6,padding:"5px 16px",fontSize:13,color:"#ff4e4e"}}>{err}</div>}
      </div>

      {/* Race Config */}
      <div style={{maxWidth:1100,margin:"0 auto 14px",background:"rgba(255,255,255,0.022)",border:"1px solid rgba(212,168,67,0.18)",borderRadius:12,padding:"14px 18px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,alignItems:"end",marginBottom:12}}>
          <div>
            <label style={LS}>レース名 <span style={{color:"#4ecdc4",fontSize:9}}>CSV自動</span></label>
            <div style={{...IS,color:raceName?"#d4a843":"#4a3010"}}>{raceName||"（CSV読込後に自動表示）"}</div>
          </div>
          <div>
            <label style={LS}>コース <span style={{color:"#4ecdc4",fontSize:9}}>CSV自動</span></label>
            <div style={{...IS,color:course?"#d4a843":"#4a3010"}}>{course&&trackType&&distance?`${course} ${trackType} ${distance}m`:"（CSV読込後に自動表示）"}</div>
          </div>
          <div>
            <label style={LS}>開催何日目 <span style={{color:"#ff9f1c",fontSize:9}}>手動</span></label>
            <select value={kaisaiDay} onChange={e=>setKaisaiDay(e.target.value)} style={IS}>
              {[1,2,3,4,5,6,7,8].map(d=><option key={d} value={d}>{d}日目</option>)}
            </select>
          </div>
          <div>
            <label style={LS}>馬場状態 <span style={{color:"#ff9f1c",fontSize:9}}>手動</span></label>
            <select value={cond} onChange={e=>setCond(e.target.value)} style={IS}>
              {["良","稍重","重","不良"].map(k=><option key={k}>{k}</option>)}
            </select>
          </div>
          {horses.length>0&&(
            <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
              <button onClick={()=>setTab("result")} style={{...BS,background:"linear-gradient(90deg,#a07010,#d4a030)",color:"#050810",fontWeight:700,padding:"9px 18px"}}>🔍 再分析</button>
              <button onClick={exportCSV} style={BS}>⬇CSV</button>
              <button onClick={()=>window.print()} style={BS}>🖨</button>
            </div>
          )}
        </div>
        {/* バイアスボタン */}
        <div style={{padding:"10px 14px",background:"rgba(148,163,184,0.06)",border:"1px solid rgba(148,163,184,0.18)",borderRadius:8}}>
          <div style={{fontSize:11,color:"#94a3b8",marginBottom:8,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span>🏟 トラックバイアス:</span>
            <span style={{color:"#d4a843"}}>{course}/{trackType}/{kaisaiDay}日目 → 自動: <b style={{color:"#f0c040"}}>{autoBiasResult.bias}</b></span>
            <span style={{color:manualBias?"#f472b6":"#4ecdc4",fontWeight:700}}>{manualBias?`🖊 手動: ${manualBias}`:"🤖 自動適用中"}</span>
            {horses.length>0&&<span style={{color:"#4a3010",fontSize:10}}>※ 条件変更は即時反映されます</span>}
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            <button onClick={()=>setManualBias("")} style={{padding:"6px 14px",borderRadius:6,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontSize:12,background:!manualBias?"rgba(78,205,196,0.22)":"rgba(255,255,255,0.04)",color:!manualBias?"#4ecdc4":"#5a4020",borderColor:!manualBias?"#4ecdc4":"rgba(100,100,100,0.3)",fontWeight:!manualBias?700:400}}>🤖 自動</button>
            {BIAS_KEYS.map(b=>(
              <button key={b} onClick={()=>{setManualBias(b);setTab("result");}} style={{padding:"6px 14px",borderRadius:6,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontSize:12,background:manualBias===b?"rgba(212,168,67,0.22)":"rgba(255,255,255,0.04)",color:manualBias===b?"#d4a843":"#5a4020",borderColor:manualBias===b?"#d4a843":"rgba(100,100,100,0.3)",fontWeight:manualBias===b?700:400}}>{b}</button>
            ))}
          </div>
          <div style={{fontSize:10,color:"#4a3010",marginTop:5}}>{autoBiasResult.note}</div>
        </div>
      </div>

      {/* レースタブ行 */}
      <div style={{maxWidth:1100,margin:"0 auto",display:"flex",gap:2,flexWrap:"wrap",alignItems:"flex-end"}}>
        {/* CSV読込タブ（固定） */}
        <button onClick={()=>{setActiveRaceId(null);setTab("import");}} style={{padding:"8px 13px",borderRadius:"7px 7px 0 0",border:"none",cursor:"pointer",background:tab==="import"?"rgba(78,205,196,0.18)":"rgba(255,255,255,0.03)",color:tab==="import"?"#4ecdc4":"#5a4020",borderBottom:tab==="import"?"2px solid #4ecdc4":"2px solid transparent",fontFamily:"inherit",fontSize:12,fontWeight:tab==="import"?700:400}}>📂 CSV読込</button>
        {/* レースタブ */}
        {races.map(r=>(
          <div key={r.id} style={{display:"flex",alignItems:"center",background:activeRaceId===r.id?"rgba(212,168,67,0.18)":"rgba(255,255,255,0.03)",borderRadius:"7px 7px 0 0",borderBottom:activeRaceId===r.id?"2px solid #d4a843":"2px solid transparent"}}>
            <button onClick={()=>{setActiveRaceId(r.id);setTab("result");}} style={{padding:"8px 10px",border:"none",cursor:"pointer",background:"transparent",color:activeRaceId===r.id?"#d4a843":"#5a4020",fontFamily:"inherit",fontSize:11,fontWeight:activeRaceId===r.id?700:400,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🏇 {r.name||"レース"}</button>
            <button onClick={()=>deleteRace(r.id)} style={{padding:"2px 6px",border:"none",cursor:"pointer",background:"transparent",color:"#5a4020",fontSize:12,fontFamily:"inherit",lineHeight:1}} title="削除">×</button>
          </div>
        ))}
      </div>
      {/* 内部タブ行（レース選択時のみ） */}
      {activeRaceId&&(
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",gap:3,flexWrap:"wrap",borderTop:"1px solid rgba(212,168,67,0.1)",paddingTop:2}}>
          {INNER_TABS.map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)} style={{padding:"6px 12px",borderRadius:"0 0 0 0",border:"none",cursor:"pointer",background:tab===t?"rgba(212,168,67,0.12)":"transparent",color:tab===t?"#d4a843":"#5a4020",borderBottom:tab===t?"2px solid #d4a843":"2px solid transparent",fontFamily:"inherit",fontSize:11,fontWeight:tab===t?700:400}}>{l}</button>
          ))}
        </div>
      )}

      <div style={{maxWidth:1100,margin:"0 auto"}}>

        {/* CSV読込 */}
        {tab==="import"&&(
          <div style={CARD}>
            <div style={{marginBottom:18}}>
              <div style={{fontSize:10,letterSpacing:4,color:"#5a4020"}}>STEP 1 — CSV読込</div>
              <div style={{fontSize:18,color:"#d4a843",fontWeight:700}}>TARGETからCSVを読み込む</div>
            </div>
            <div style={{background:"rgba(0,0,0,0.3)",borderRadius:10,padding:"14px 18px",marginBottom:18,fontSize:13,lineHeight:2,color:"#b8a070"}}>
              <b style={{color:"#f0c040"}}>① 全馬全成績CSV（必須）</b><br/>
              出馬表分析 → 前走読 → 出力 →「全馬全成績CSV形式」→「成績フルセットデータ」<br/>
              <b style={{color:"#f0c040"}}>② 出馬表CSV（推奨）</b><br/>
              出馬表分析 → 出力 →「出馬表CSV形式」（馬番・騎手・競馬場を自動認識）
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:18}}>
              <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(212,168,67,0.2)",borderRadius:10,padding:"16px 18px"}}>
                <label style={{...LS,marginBottom:10}}>① 全馬全成績CSV <span style={{color:"#ff4e4e"}}>必須</span></label>
                <input ref={zenbaRef} type="file" accept=".csv" style={{color:"#b8a070",fontSize:13,width:"100%"}}/>
              </div>
              <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(212,168,67,0.2)",borderRadius:10,padding:"16px 18px"}}>
                <label style={{...LS,marginBottom:10}}>② 出馬表CSV <span style={{color:"#9a7a40"}}>推奨</span></label>
                <input ref={shutsubaRef} type="file" accept=".csv" style={{color:"#b8a070",fontSize:13,width:"100%"}}/>
              </div>
            </div>

            <div style={{textAlign:"center"}}>
              <button onClick={handleFiles} disabled={loading} style={{...BS,background:loading?"rgba(80,80,80,0.3)":"linear-gradient(90deg,#a07010,#d4a030)",color:loading?"#888":"#050810",fontWeight:700,padding:"13px 48px",fontSize:16,borderColor:"transparent"}}>
                {loading?"⏳ 解析中...":"🔍 CSV解析して分析開始"}
              </button>
            </div>
            <div style={{marginTop:16,padding:"12px 16px",background:"rgba(78,205,196,0.05)",border:"1px solid rgba(78,205,196,0.18)",borderRadius:8,fontSize:12,color:"#3a6a60",lineHeight:1.9}}>
              <b style={{color:"#4ecdc4"}}>v7.0 自動計算される項目：</b><br/>
              持ち時計（近5走国内平均）・上り3F（近5走平均）・<b style={{color:"#fbbf24"}}>重賞実績（G1/G2/G3の好走を自動スコア化）</b>・コース適性・騎手スコア・乗り替わり（海外帰り対応）・フォームスコア（直近着順＋近5走ベスト）
            </div>
          </div>
        )}

        {/* 分析結果 */}
        {tab==="result"&&activeRaceId&&(
          <div style={CARD}>
            {horses.length===0?(
              <div style={{textAlign:"center",padding:"48px 0",color:"#4a3010"}}>
                <div style={{fontSize:40,marginBottom:12}}>📂</div>
                <div>CSV読込タブからデータを読み込んでください</div>
              </div>
            ):(
              <>
                <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
                  <div>
                    <div style={{fontSize:10,letterSpacing:4,color:"#5a4020"}}>ANALYSIS RESULT</div>
                    <div style={{fontSize:20,color:"#d4a843",fontWeight:700}}>{raceName||"分析結果"}</div>
                    <div style={{fontSize:12,color:"#5a4020",marginTop:2}}>{course} {trackType} {distance}m（{DIST_LABEL[cat]}）　馬場:{cond}　バイアス:{effectiveBias}{!manualBias&&<span style={{color:"#6a5020",fontSize:10}}>（自動）</span>}</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={exportCSV} style={BS}>⬇CSV</button>
                    <button onClick={()=>window.print()} style={BS}>🖨</button>
                    <button onClick={()=>setTab("bets")} style={{...BS,color:"#f7ec59"}}>🎯 買い目→</button>
                  </div>
                </div>

                {/* Podium */}
                {results.length>=3&&(
                  <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:20,alignItems:"flex-end"}}>
                    {[ranked[1],ranked[0],ranked[2]].map((h,pi)=>{
                      const rk=h.rank;
                      const ht=[88,118,68],lb=["2nd","1st","3rd"],gc=["#909098","#d4a843","#b07040"];
                      return(
                        <div key={h.name} style={{textAlign:"center",flex:1,maxWidth:135}}>
                          <div style={{fontSize:11,color:rk.color,fontWeight:700}}>{rk.label}</div>
                          <div style={{fontSize:12,color:"#e8dcc8",fontWeight:700,marginBottom:2}}>{h.bango?`#${h.bango} `:""}{h.name}</div>
                          <div style={{fontSize:11,color:"#7a6040"}}>{h.jockey}</div>
                          <div style={{fontSize:21,fontWeight:700,color:gc[pi],margin:"4px 0"}}>{h.total}</div>
                          <div style={{height:ht[pi],background:`linear-gradient(180deg,${gc[pi]}26,${gc[pi]}08)`,border:`1px solid ${gc[pi]}40`,borderRadius:"5px 5px 0 0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,color:gc[pi]}}>{lb[pi]}</div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* 並べ替えボタン */}
                <div style={{marginBottom:14,padding:"10px 12px",background:"rgba(0,0,0,0.2)",border:"1px solid rgba(212,168,67,0.15)",borderRadius:8}}>
                  <div style={{fontSize:10,color:"#5a4020",marginBottom:7,letterSpacing:2}}>並べ替え</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {[
                      ["total",      "🏆 総合"],
                      ["bestTime",   "⏱ 持ち時計"],
                      ["agari3f",    "🔥 上り3F"],
                      ["gradeBonus", "🥇 重賞実績"],
                      ["jockey",     "🎽 騎手"],
                      ["riderChange","🔄 乗り替わり"],
                    ].map(([key,label])=>(
                      <button key={key} onClick={()=>setSortKey(key)} style={{
                        padding:"5px 11px",borderRadius:6,border:"1px solid",cursor:"pointer",
                        fontFamily:"inherit",fontSize:11,
                        background:sortKey===key?"rgba(212,168,67,0.22)":"rgba(255,255,255,0.04)",
                        color:sortKey===key?"#d4a843":"#5a4020",
                        borderColor:sortKey===key?"#d4a843":"rgba(100,100,100,0.3)",
                        fontWeight:sortKey===key?700:400,
                      }}>{label}</button>
                    ))}
                  </div>
                  {sortKey!=="total"&&<div style={{fontSize:10,color:"#4a3010",marginTop:5}}>※ 印（◎○▲）は総合スコア順のまま。並べ替えは表示順のみ変更。</div>}
                </div>

                {/* Rankings */}
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {results.map((h,i)=>{
                    const rk=h.rank;
                    const pct=(h.total/topScore)*100;
                    return(
                      <div key={h.name} style={{background:rk.bg,border:`1px solid ${rk.color}20`,borderRadius:10,padding:"11px 13px",borderLeft:`4px solid ${rk.color}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                          <div style={{fontSize:14,color:"#4a3010",width:18,fontWeight:700}}>{i+1}</div>
                          <div style={{fontSize:13,color:rk.color,fontWeight:700,minWidth:68}}>{rk.label}</div>
                          <div style={{flex:1,fontSize:14,fontWeight:700,color:"#e8dcc8"}}>
                            {h.bango&&<span style={{color:"#5a4020",fontSize:11,marginRight:4}}>#{h.bango}</span>}
                            {h.name}
                            <span style={{color:"#5a4020",fontSize:10,marginLeft:6}}>{h.style}</span>
                            {h.isOverseasReturn&&<span style={{color:"#fb923c",fontSize:10,marginLeft:6}}>⚠海外帰り</span>}
                          </div>
                          <div style={{fontSize:11,textAlign:"right"}}>
                            <div style={{color:"#b8a070"}}>{h.jockey}</div>
                            <div style={{color:h.rcLabel==="大幅強化"||h.rcLabel==="強化"?"#4ecdc4":h.rcLabel.includes("弱")?"#ff4e4e":"#5a4020",fontSize:10}}>{h.rcLabel}</div>
                          </div>
                          <div style={{fontSize:22,fontWeight:700,color:rk.color,minWidth:46,textAlign:"right"}}>{h.total}</div>
                        </div>
                        <div style={{marginTop:6,height:3,background:"rgba(255,255,255,0.05)",borderRadius:2,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${rk.color}44,${rk.color})`,borderRadius:2}}/>
                        </div>
                        {/* スコア内訳 */}
                        <div style={{display:"flex",gap:4,marginTop:7,flexWrap:"wrap"}}>
                          {Object.entries(h.scores).map(([k,v])=>(
                            <div key={k} style={{fontSize:10,background:"rgba(0,0,0,0.28)",borderRadius:4,padding:"2px 6px"}}>
                              <span style={{color:W_COLOR[k]}}>{W_LABEL[k]}</span>
                              <span style={{color:"#e8dcc8",fontWeight:700,marginLeft:2}}>{Math.round(v)}</span>
                              <span style={{color:"#3a2010",marginLeft:1}}>×{W[k]}%</span>
                            </div>
                          ))}
                        </div>
                        {/* 詳細 */}
                        <div style={{display:"flex",gap:10,marginTop:5,fontSize:11,color:"#6a5030",flexWrap:"wrap"}}>
                          <span>持ち時計: <b style={{color:"#f0c040"}}>{h.bestTime?h.bestTime+"秒":"---"}</b>({h.runs1200}走)</span>
                          <span>上り3F: <b style={{color:"#4ecdc4"}}>{h.bestAgari?h.bestAgari+"秒":"---"}</b></span>
                          <span>直近国内: <b style={{color:h.recentChaku<=3?"#4ecdc4":h.recentChaku<=5?"#b8a070":h.recentChaku<=8?"#ff9f1c":"#ff4e4e"}}>{h.recentChaku<=18?h.recentChaku+"着":"---"}</b></span>
                          <span>近5ベスト: <b style={{color:"#a78bfa"}}>{h.best5Chaku<=18?h.best5Chaku+"着":"---"}</b></span>
                          {h.gradeBonusScore>0&&<span>重賞実績: <b style={{color:"#fbbf24"}}>{h.gradeBonusScore}点</b></span>}
                          {h.prevJockey&&h.prevJockey!==h.jockey&&<span>前走騎手: <b style={{color:"#f472b6"}}>{h.prevJockey}</b></span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        )}

        {/* 買い目 */}
        {tab==="bets"&&activeRaceId&&(
          <div style={CARD}>
            <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:10,letterSpacing:4,color:"#5a4020"}}>BET SUGGESTIONS</div>
                <div style={{fontSize:20,color:"#d4a843",fontWeight:700}}>{raceName||"買い目提案"}</div>
              </div>
              {ranked.length>0&&(
                <button onClick={()=>{
                  const top=ranked.slice(0,4);
                  const marks=["◎","○","▲","☆"];
                  const lines=[
                    `【${raceName||"買い目"}】`,
                    `バイアス: ${effectiveBias} / 馬場: ${cond}`,
                    ``,
                    ...top.map((h,i)=>`${marks[i]} #${h.bango} ${h.name}（${h.jockey}）${h.total}点`),
                    ``,
                    ...bets.map(b=>`【${b.type}】${b.label}　信頼度:${b.conf}`),
                  ].join("
");
                  navigator.clipboard.writeText(lines).then(()=>flash("📋 買い目テキストをコピーしました"));
                }} style={{...BS,background:"rgba(78,205,196,0.15)",color:"#4ecdc4",borderColor:"rgba(78,205,196,0.4)",fontWeight:700}}>
                  📋 テキストコピー
                </button>
              )}
            </div>
            {results.length===0?<div style={{textAlign:"center",color:"#4a3010",padding:"36px 0"}}>データを読み込んでください</div>:(
              <>
                <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
                  {ranked.slice(0,3).map((h,i)=>{
                    const rk=h.rank; const badge=["◎","○","▲"][i];
                    return(
                      <div key={h.name} style={{flex:1,minWidth:100,background:rk.bg,border:`1px solid ${rk.color}44`,borderRadius:10,padding:"12px 12px",textAlign:"center"}}>
                        <div style={{fontSize:24,color:rk.color,fontWeight:700}}>{badge}</div>
                        <div style={{fontSize:12,color:"#e8dcc8",fontWeight:600,marginTop:2}}>{h.bango?`#${h.bango} `:""}{h.name}</div>
                        <div style={{fontSize:10,color:"#7a6040",marginTop:1}}>{h.jockey} / {h.rcLabel}</div>
                        <div style={{fontSize:20,color:rk.color,fontWeight:700,marginTop:2}}>{h.total}点</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {bets.map((bet,i)=>{
                    const cc={高:"#4ecdc4",中:"#f7ec59",低:"#ff9f1c"}[bet.conf]||"#888";
                    return(
                      <div key={i} style={{background:"rgba(255,255,255,0.022)",border:"1px solid rgba(212,168,67,0.13)",borderRadius:9,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                        <div style={{background:"rgba(212,168,67,0.13)",borderRadius:5,padding:"2px 11px",fontSize:12,color:"#d4a843",fontWeight:700,minWidth:58,textAlign:"center"}}>{bet.type}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,color:"#e8dcc8",fontWeight:700}}>{bet.label}</div>
                          <div style={{fontSize:11,color:"#5a4020",marginTop:1}}>{bet.desc}</div>
                        </div>
                        <div style={{fontSize:12,color:cc,fontWeight:700}}>信頼度 {bet.conf}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:12,padding:"10px 14px",background:"rgba(0,0,0,0.2)",borderRadius:8,fontSize:11,color:"#4a3010"}}>
                  ※ 買い目はスコア順位を基にした参考情報です。実際の購入はご自身の判断でお願いします。
                </div>
              </>
            )}
          </div>
        )}

        {/* バイアス情報 */}
        {tab==="bias"&&activeRaceId&&(
          <div style={CARD}>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,letterSpacing:4,color:"#5a4020"}}>TRACK BIAS DATABASE</div>
              <div style={{fontSize:18,color:"#d4a843",fontWeight:700}}>各競馬場のバイアス傾向</div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:"1px solid rgba(212,168,67,0.22)"}}>
                    <th style={{padding:"8px 12px",textAlign:"left",color:"#9a7a40"}}>競馬場</th>
                    <th style={{padding:"8px 10px",textAlign:"center",color:"#9a7a40",fontSize:11}}>芝/ダ</th>
                    {["1-2日目","3-4日目","5-6日目","7日目〜"].map(h=>(
                      <th key={h} style={{padding:"8px 10px",textAlign:"center",color:"#9a7a40",fontSize:11}}>{h}</th>
                    ))}
                    <th style={{padding:"8px 10px",textAlign:"left",color:"#9a7a40",fontSize:11}}>特徴</th>
                  </tr>
                </thead>
                <tbody>
                  {Object.entries(COURSE_BIAS_DB).flatMap(([name,data])=>
                    [["芝",data.芝],["ダ",data.ダ]].map(([type,bias])=>{
                      const isCur=name===course&&type===(trackType==="ダ"?"ダ":"芝");
                      const bc=b=>b==="内・逃げ先行有利"?"#60a5fa":b==="外・差し有利"?"#fb923c":b==="内・差し有利"?"#a78bfa":"#6ee7b7";
                      return(
                        <tr key={name+type} style={{borderBottom:"1px solid rgba(255,255,255,0.04)",background:isCur?"rgba(212,168,67,0.07)":"transparent"}}>
                          <td style={{padding:"7px 12px",color:isCur?"#d4a843":"#b8a070",fontWeight:isCur?700:400}}>{name}{isCur?" ◀":""}</td>
                          <td style={{padding:"7px 10px",textAlign:"center",color:"#7a6040",fontSize:11}}>{type}</td>
                          {["early","mid","late","final"].map(k=>(
                            <td key={k} style={{padding:"7px 10px",textAlign:"center",background:isCur&&getDayCat(kaisaiDay)===k?"rgba(212,168,67,0.12)":"transparent"}}>
                              <span style={{fontSize:11,color:bc(bias[k]),fontWeight:isCur&&getDayCat(kaisaiDay)===k?700:400}}>{bias[k]}</span>
                            </td>
                          ))}
                          <td style={{padding:"7px 10px",fontSize:10,color:"#4a3010"}}>{type==="芝"?data.note:""}</td>
                        </tr>
                      );
                    })
                  )}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* 重み */}
        {tab==="weights"&&activeRaceId&&(
          <div style={CARD}>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,letterSpacing:4,color:"#5a4020"}}>WEIGHT SYSTEM</div>
              <div style={{fontSize:18,color:"#d4a843",fontWeight:700}}>距離別 重み付け一覧</div>
              <div style={{fontSize:12,color:"#5a4020",marginTop:3}}>現在: <b style={{color:"#d4a843"}}>{DIST_LABEL[cat]}（{distance}m）</b></div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:"1px solid rgba(212,168,67,0.22)"}}>
                    <th style={{padding:"8px 12px",textAlign:"left",color:"#9a7a40"}}>分析項目</th>
                    {Object.entries(DIST_LABEL).map(([k,l])=>(
                      <th key={k} style={{padding:"8px 9px",textAlign:"center",color:k===cat?"#d4a843":"#4a3010",fontWeight:k===cat?700:400,background:k===cat?"rgba(212,168,67,0.07)":"transparent",fontSize:11}}>{l}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {Object.entries(W_LABEL).map(([k,label])=>(
                    <tr key={k} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                      <td style={{padding:"7px 12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <span style={{width:8,height:8,borderRadius:"50%",background:W_COLOR[k],display:"inline-block",flexShrink:0}}/>
                          <span style={{color:"#b8a070"}}>{label}</span>
                        </div>
                      </td>
                      {Object.keys(DIST_LABEL).map(dc=>(
                        <td key={dc} style={{padding:"7px 9px",textAlign:"center",background:dc===cat?"rgba(212,168,67,0.05)":"transparent"}}>
                          <span style={{fontSize:13,fontWeight:700,color:dc===cat?W_COLOR[k]:"#4a3010"}}>{WEIGHTS[dc][k]}%</span>
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

      </div>
      <div style={{textAlign:"center",marginTop:20,fontSize:9,color:"#140c04",letterSpacing:4}}>━━ KEIBA ANALYSIS v7.0 ━━</div>
      <style>{`@media print { button,select,input[type=file] { display:none!important; } body { background:white!important; color:black!important; } }`}</style>
    </div>
  );
}

const CARD={background:"rgba(255,255,255,0.020)",border:"1px solid rgba(212,168,67,0.15)",borderRadius:"0 12px 12px 12px",padding:"18px"};
const LS={display:"block",fontSize:10,color:"#5a4020",letterSpacing:2,marginBottom:4,textTransform:"uppercase"};
const IS={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(212,168,67,0.18)",borderRadius:6,color:"#e8dcc8",padding:"7px 9px",fontSize:12,width:"100%",boxSizing:"border-box",fontFamily:"inherit",outline:"none"};
const BS={background:"rgba(212,168,67,0.10)",border:"1px solid rgba(212,168,67,0.30)",borderRadius:7,color:"#d4a843",padding:"7px 13px",fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(KeibaApp));
  </script>
</body>
</html>
